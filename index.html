<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Tic-Tac-Toe with Minimax AI</h1>
    <p class="instructions">You are <span class="player-x">X</span>. Click an empty cell to play. The AI is <span class="player-o">O</span>.</p>

    <div class="board" id="board"></div>
    <div class="info">
      <p id="status">Your move.</p>
      <button id="resetButton">Restart Game</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
